name: Update Grenadier feature page

on:
  schedule:
    # Runs daily at 06:00 UTC. Adjust to taste (https://crontab.guru).
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # allows the job to commit the regenerated page

concurrency:
  group: grenadier-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve Playwright version
        id: pw
        run: |
          PW_VERSION=$(python -c "import importlib.metadata as m; print(m.version('playwright'))")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape + classify + render
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5
        run: python update.py

      - name: Commit & push if changed
        run: |
          git config user.name  "grenadier-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new posts — nothing to commit."
          else
            git commit -m "Auto-update features ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
